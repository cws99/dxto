## ODK seed configuration for DxTO (Diagnostic Test Ontology)
## Run with the ODK seed script (see SETUP_GUIDE.md). This generates a
## repository whose structure mirrors monarch-initiative/mondo, because
## MONDO itself is generated by this same tool.

id: dxto
title: "Diagnostic Test Ontology"
github_org: cws99
repo: dxto
release_artefacts:
  - base
  - full
  - simple
primary_release: full
export_formats:
  - owl
  - obo
  - json
import_group:
  products:
    # Slim imports of the source vocabularies you map to.
    # MONDO is the disease backbone your tests attach to.
    - id: mondo
    # NOTE: LOINC and SNOMED are not OBO ontologies and are not pulled
    # as standard ODK imports. Manage those mappings as SSSOM TSVs in
    # components/ instead (see SETUP_GUIDE.md, "Source vocabularies").
robot_java_args: '-Xmx4G'
components:
  products:
    # Layer 2: the test->disease edges, merged into the release build.
    - filename: dxto-diagnostic-relations.owl
    # Mapping set(s) to LOINC/SNOMED kept as components too.
    - filename: dxto-mappings.owl
documentation:
  documentation_system: mkdocs
